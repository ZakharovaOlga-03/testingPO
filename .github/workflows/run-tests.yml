name: Run Auto Tests

# Когда запускать workflow
on:
  push:
    branches: [ main, master ]  # при пуше в main/master
  pull_request:
    branches: [ main, master ]  # при создании PR
  workflow_dispatch:             # возможность запуска вручную

# Что делаем
jobs:
  test:
    name: Run tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    # Стратегия: тестируем на разных ОС
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11']
      fail-fast: false  # не останавливать при ошибке на одной ОС
    
    steps:
      # Шаг 1: Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Шаг 2: Устанавливаем Python
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'  # кэшируем зависимости для ускорения
      
      # Шаг 3: Показываем версии (для отладки)
      - name: Display Python version
        run: python --version
      
      # Шаг 4: Устанавливаем зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash
      
      # Шаг 5: Запускаем тесты
      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short
        continue-on-error: false  # останавливать при ошибке
      
      # Шаг 6: Загружаем отчет (опционально)
      - name: Upload test results
        if: always()  # выполняем даже при ошибке
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            pytest-report.html
            .pytest_cache/
          retention-days: 30